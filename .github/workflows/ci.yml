name: CI HTML Lint

# Static-site lint workflow: validates the mockup HTML.
# No build step — single index.html mockup.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-html-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: HTML + shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HTML5 validation
        run: |
          pip install html5validator
          html5validator --root . --also-check-css --blacklist css/ || true
        continue-on-error: true